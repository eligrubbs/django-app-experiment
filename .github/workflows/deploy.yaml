name: Deploy

on:
  workflow_run:
    workflows: ["Run Tests & Maybe Build"]
    types: [completed]
  workflow_dispatch:


concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  image-digest:
    name: "Gather Image Digest"
    runs-on: ubuntu-slim
    outputs:
      migrations: ${{ steps.digest.outputs.digest }}
    steps:
    - name: Download digest artifact
      uses: actions/download-artifact@v8
      with:
        name: image-digest
        run-id: ${{ github.event.workflow_run.id }}
    - name: Read digest
      id: digest
      run: echo "digest=$(cat digest.txt)" >> $GITHUB_OUTPUT
  changes:
    name: "Detect Changes"
    runs-on: ubuntu-slim
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            migrations:
              - 'apps/**/migrations/*'
      - name: Set image tag
        id: image_url
        run: |
          echo "IMAGE=ghcr.io/eligrubbs/django-app-experiment:${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
  deploy-production:
    name: Deploy to Production
    needs: [image-digest, changes]
    if: >
      always() && !failure() && !cancelled() &&
      (
        ( github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' )
        ||
        ( github.event_name == 'workflow_dispatch' )
      )
    uses: ./.github/workflows/deploy_environment.yaml
    with:
      environment: production
      docker-digest: ${{ needs.image-digest.outputs.digest }}
      render-webapp-service-id: "srv-d7n97o0g4nts73b1rg00"
      has-migrations: ${{ needs.changes.outputs.migrations == 'true' || github.event_name == 'workflow_dispatch' }}
      skip-webapp: ${{ github.event_name == 'fake_name_so_this_is_never_true' }}
    secrets:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
