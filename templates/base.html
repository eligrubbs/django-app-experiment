{% load static %}
<!DOCTYPE html>
<html lang="en" {% if dark_mode %}class="dark" data-theme="{{ web.dark_theme }}"{% endif %}>
<head>
    <meta charset="utf-8">
    {# IE compatibility #}
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    {# Mobile friendly #}
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {# Tailwind #}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">

    {# Alpine.JS #}
    <script defer src="{% static 'js/alpinejs.min.js' %}"></script>

    {# HTMX #}
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <script src="{% static 'js/response-targets.min.js' %}"></script>

    {% include 'web/components/favicon.html' %}

    {% block page_head %}
    {% endblock %}
</head>
<body>

  {% block body %}
  {% endblock body %}

  <script>
    function syncDarkMode() {
      // https://tailwindcss.com/docs/dark-mode
      // change the dark and light theme values in settings.py to match the DaisyUI theme names
      // to use for dark and light mode, and they will get updated here.
      const darkTheme = '{{ web.dark_theme }}' || 'dark';
      const lightTheme = '{{ web.light_theme }}' || 'light';
      const systemTheme = 'system';

      const theme = localStorage.getItem('theme') || systemTheme;
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (theme === darkTheme || (theme === systemTheme && prefersDark)) {
        // document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-theme', darkTheme);
        // set a cookie and use it during server rendering to avoid a flicker across page loads
        document.cookie = `theme=${darkTheme};path=/;max-age=31536000`;
      } else {
        // document.documentElement.classList.remove('dark');
        document.documentElement.setAttribute('data-theme', lightTheme);
        document.cookie = `theme=${lightTheme};path=/;max-age=31536000`;
      }
    }
    syncDarkMode();
    document.addEventListener('DOMContentLoaded', () => {

      // Watch for changes in the prefers-color-scheme
      const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
      mediaQuery.addListener(syncDarkMode);

      // Watch for theme changes - controlled by the selector in the nav
      window.addEventListener('storage', (event) => {
        if (event.key === 'theme') {
          syncDarkMode();
        }
      });
    });
  </script>

  {% block scripts %}
  {% endblock scripts %}
</body>
</html>
